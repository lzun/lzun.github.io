    Publications:
      - title: Enhanced phishing detection using multimodal data
        authors:
          - Lázaro Bustio-Martínez
          - Vitali Herrera-Semenets
          - Jorge A. González-Ordiano
          - Yamel Pérez-Guadarrama
          - Luis N. Zúñiga-Morales
          - Daniela Montoya-Godínez
          - Miguel A. Álvarez-Carmona
          - Jan van den Berg
        publisher: Knowledge-Based Systems
        releaseDate: 2025
        url: https://www.sciencedirect.com/science/article/abs/pii/S0950705125021434
        summary: hishing remains one of the most persistent cybersecurity threats, increasingly exploiting not only technical vulnerabilities but also human cognitive biases. Existing detection systems often rely on single-modality features and black-box models, which restrict both generalization and interpretability. This study presents an explainable multimodal framework that combines textual and technical cues, including message content, URL structure, and Principles of Persuasion, to capture both objective and subjective aspects of phishing.

      - title: Análisis de emociones en torno a las comunidades de activistas en el contexto de las movilizaciones del \#8M2023 en México
        authors:
          -  M. Portillo Sánchez
          - J. Á. González Ordiano
          - J. E. Quiroz Ibarra
          - L. Zúñiga Morales
        publisher: Revista Iberoamericana de Comunicación
        releaseDate: 2025
        url: https://ric.ibero.mx/index.php/ric/article/view/190
        summary: En este artículo se aborda el estudio de las emociones expresadas en los hasthtags producidos en torno a las movilizaciones feministas ocurridas el 8 de marzo de 2023 en México. Para realizar el análisis de datos correspondiente al \#8M2023 en la red social X (antes Twitter) se utilizó la API de X para recolectar una muestra de 1301 publicaciones de 866 usuarios únicos. Se analizaron con base en la propuesta de Jasper (2012). El análisis permitió identificar nodos, comunidades y reivindicaciones vinculadas a emociones y la conexión generacional presente en las consignas.

      - title: Machine learning framework for country image analysis
        authors:
          - L. N. Zúñiga-Morales
          - J. Á. González-Ordiano
          - J. E. Quiroz-Ibarra
          - C. Villanueva Rivas
        publisher: Journal of Computational Social Science
        releaseDate: 2024
        url: https://doi.org/10.1007/s42001-023-00246-3
        summary: In this work, we compare the performance of a machine learning framework based on a support vector machine (SVM) with fastText embeddings, and a Deep Learning framework consisting on fine-tuning Large Language Models (LLMs) like Bidirectional Encoder Representations from Transformers (BERT), DistilBERT, and Twitter roBERTa Base, to automate the classification of text data to analyze the country image of Mexico in selected data sources, which is described using 18 different classes, based in International Relations theory. 

